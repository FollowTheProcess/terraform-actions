name: Terraform Apply
description: GitHub Actions to apply Terraform infrastructure changes
author: FollowTheProcess

inputs:
  terraform-version:
    description: The version of Terraform to install and run
    required: false
    default: latest

  backend-config:
    description: Optional path to a .tfbackend file (relative to `cwd`) to use for initialisation
    required: false
    default: ""

  plan-artifact-name:
    description: |
      Name of a plan artifact (produced by the `plan` action in an earlier job) to download and apply.
      This is the recommended way to chain plan → apply across jobs.
      Mutually exclusive with `plan-filename` and `var-file`.
    required: false
    default: ""

  plan-filename:
    description: |
      Path to a previously produced terraform plan file that is already present on disk in `cwd`
      (e.g. because you downloaded the artifact yourself). For the cross-job case prefer `plan-artifact-name`.
      Mutually exclusive with `plan-artifact-name` and `var-file`.
    required: false
    default: ""

  var-file:
    description: The path to a .tfvars file to use for the apply. Mutually exclusive with `plan-artifact-name` and `plan-filename`.
    required: false
    default: ""

  cwd:
    description: The working directory to be in for the duration of the action
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate Inputs
      shell: bash
      env:
        PLAN_ARTIFACT_NAME: ${{ inputs.plan-artifact-name }}
        PLAN_FILENAME: ${{ inputs.plan-filename }}
        VAR_FILE: ${{ inputs.var-file }}
      run: |
        set_count=0
        [[ -n "$PLAN_ARTIFACT_NAME" ]] && set_count=$((set_count + 1))
        [[ -n "$PLAN_FILENAME" ]]      && set_count=$((set_count + 1))
        [[ -n "$VAR_FILE" ]]           && set_count=$((set_count + 1))
        if (( set_count > 1 )); then
          echo "::error::At most one of plan-artifact-name, plan-filename, var-file may be set (got $set_count)"
          exit 1
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: true

    - name: Compute Provider Cache Key
      id: cache-key
      shell: bash
      run: |
        lock="${{ inputs.cwd }}/.terraform.lock.hcl"
        if [[ ! -f "$lock" ]]; then
          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No .terraform.lock.hcl in '${{ inputs.cwd }}', provider cache disabled"
          exit 0
        fi
        echo "enabled=true" >> "$GITHUB_OUTPUT"
        echo "key=terraform-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.cwd)) }}" >> "$GITHUB_OUTPUT"

    - name: Create Terraform Cache
      shell: bash
      run: mkdir --parents ${{ github.workspace }}/.terraform.d/plugin-cache

    - name: Restore Terraform Cache
      id: cache-restore
      if: steps.cache-key.outputs.enabled == 'true'
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.terraform.d/plugin-cache
        key: ${{ steps.cache-key.outputs.key }}

    - name: Initialise Terraform
      if: inputs.backend-config != ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: terraform init -backend-config=${{ inputs.backend-config }}
      env:
        TF_IN_AUTOMATION: true
        TF_INPUT: false
        TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

    - name: Initialise Terraform
      if: inputs.backend-config == ''
      shell: bash
      working-directory: ${{ inputs.cwd }}
      run: terraform init
      env:
        TF_IN_AUTOMATION: true
        TF_INPUT: false
        TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

    # Save only on non-PR events (typically push to the default branch). GitHub scopes caches
    # by branch: a cache created on a PR branch is visible only to that same PR, so saving there
    # writes a throwaway cache that main and other PRs can never read. Saving on the default
    # branch is what makes the cache reusable across every later run.
    # Skip when the primary key was an exact hit (nothing new to save). The save reuses the
    # restore step's primary key so it always matches the key the next run will look up.
    - name: Save Terraform Cache
      if: >-
        steps.cache-key.outputs.enabled == 'true' &&
        github.event_name != 'pull_request' &&
        steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/.terraform.d/plugin-cache
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}

    - name: Download Plan Artifact
      if: inputs.plan-artifact-name != ''
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.plan-artifact-name }}
        # Land the artifact contents inside `cwd`. upload-artifact uses the least
        # common ancestor of its `path:` inputs as the artifact root, so when plan
        # uploads `<cwd>/<file>.tfplan` the artifact contains a flat `<file>.tfplan`.
        # Downloading to `cwd` puts the file back where the resolver expects it.
        path: ${{ inputs.cwd }}

    - name: Resolve Apply Args
      id: resolve
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        PLAN_ARTIFACT_NAME: ${{ inputs.plan-artifact-name }}
        PLAN_FILENAME: ${{ inputs.plan-filename }}
        VAR_FILE: ${{ inputs.var-file }}
      run: |
        if [[ -n "$PLAN_ARTIFACT_NAME" ]]; then
          mapfile -t plans < <(find . -maxdepth 2 -name '*.tfplan' -type f)
          if (( ${#plans[@]} == 0 )); then
            echo "::error::plan-artifact-name '$PLAN_ARTIFACT_NAME' contained no .tfplan file"
            exit 1
          fi
          if (( ${#plans[@]} > 1 )); then
            echo "::warning::multiple .tfplan files found, using ${plans[0]}"
          fi
          echo "args=${plans[0]}" >> "$GITHUB_OUTPUT"
        elif [[ -n "$PLAN_FILENAME" ]]; then
          echo "args=$PLAN_FILENAME" >> "$GITHUB_OUTPUT"
        elif [[ -n "$VAR_FILE" ]]; then
          echo "args=-var-file=$VAR_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "args=" >> "$GITHUB_OUTPUT"
        fi

    - name: Terraform Apply
      shell: bash
      working-directory: ${{ inputs.cwd }}
      env:
        TF_IN_AUTOMATION: true
        TF_INPUT: false
        TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        APPLY_ARGS: ${{ steps.resolve.outputs.args }}
      run: terraform apply -auto-approve $APPLY_ARGS
